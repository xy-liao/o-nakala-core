name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,ml]
    
    - name: Verify installation
      run: |
        python -c "import nakala_client; print('Package imported successfully')"
        python -c "import pytest; print('Pytest imported successfully')"
        echo "Checking test directory contents:"
        ls -la tests/
        echo "Checking for test files:"
        find tests/ -name "*.py" -type f
        echo "Testing pytest collection with debug:"
        python -m pytest --collect-only tests/ -v || echo "Collection failed"
        echo "Testing direct import of test modules:"
        python -c "import tests.unit.test_import; print('test_import.py imports OK')" || echo "Failed to import test_import.py"
        python -c "import tests.conftest; print('conftest.py imports OK')" || echo "Failed to import conftest.py"
    
    - name: Lint with flake8
      run: |
        flake8 src/nakala_client --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/nakala_client --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
    
    - name: Format check with black
      run: |
        black --check src/nakala_client
    
    - name: Type check with mypy
      run: |
        mypy src/nakala_client
      continue-on-error: true
    
    - name: Test with pytest
      env:
        PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
      run: |
        echo "Current working directory:"
        pwd
        echo "Workspace:"
        echo $GITHUB_WORKSPACE
        echo "Python path:"
        python -c "import sys; print('\n'.join(sys.path))"
        echo "PYTHONPATH environment:"
        echo $PYTHONPATH
        echo "Running pytest with collection check first:"
        python -m pytest --collect-only tests/ -v --tb=short || echo "Collection failed with exit code $?"
        echo "Now running actual tests:"
        python -m pytest $GITHUB_WORKSPACE/tests/ --cov=src/nakala_client --cov-report=xml --cov-report=term-missing -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package
      run: |
        twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/